camera:
  device: 0
  fps: 30
  resolution: [640, 480]

recognition:
  confidence_threshold: 0.85
  cooldown_ms: 800
  motion_buffer_frames: 20
  static_confirm_frames: 3
  # Tuning knobs — raise to require tighter / cleaner gestures, lower to
  # be more lenient. All values are normalized 0..1 image coords.
  ok_sign_distance: 0.08          # max thumb-tip ↔ index-tip distance for OK sign
  motion_threshold: 0.15          # min total displacement for a swipe
  motion_template_threshold: 0.12 # max DTW distance for a custom-motion match
  # Performance:
  # detect_every_n_frames: 2     # detect every Nth captured frame; preview keeps full rate
  # use_gpu: true                # try MediaPipe Metal/GPU delegate (falls back to CPU on failure)

gestures:
  thumbs_up:
    type: static
    action:
      type: hotkey
      keys: ["cmd", "c"]
    # Per-app overrides — same gesture, different action depending on
    # the frontmost app's bundle ID. Falls back to the default `action`.
    app_overrides:
      "com.google.Chrome":
        type: hotkey
        keys: ["cmd", "t"]   # new tab in Chrome
      "com.microsoft.VSCode":
        type: hotkey
        keys: ["cmd", "n"]   # new file in VS Code

  peace:
    type: static
    action:
      type: hotkey
      keys: ["cmd", "v"]

  fist:
    type: static
    action:
      type: shell
      command: "osascript -e 'tell application \"Spotify\" to playpause'"

  open_palm:
    type: static
    action:
      type: hotkey
      keys: ["cmd", "tab"]

  ok_sign:
    type: static
    action:
      type: hotkey
      keys: ["cmd", "space"]

  swipe_left:
    type: motion
    action:
      type: shell
      command: "open -a 'Mission Control'"

  swipe_right:
    type: motion
    action:
      type: hotkey
      keys: ["cmd", "shift", "4"]

  # Custom static poses — pattern is [thumb, index, middle, ring, pinky],
  # 1=extended, 0=folded. Add your own with any 5-bit combo.
  rock:  # 🤘
    type: static
    pattern: [0, 1, 0, 0, 1]
    action:
      type: hotkey
      keys: ["cmd", "shift", "m"]  # Zoom mute mic

  phone:  # 🤙
    type: static
    pattern: [1, 0, 0, 0, 1]
    action:
      type: hotkey
      keys: ["cmd", "shift", "v"]  # Zoom toggle camera

  # Two-handed poses — both `pattern_left` and `pattern_right` must match.
  # type=static_dual is checked BEFORE single-hand poses when 2 hands visible.
  high_five:  # 🖐️🖐️
    type: static_dual
    pattern_left:  [1, 1, 1, 1, 1]
    pattern_right: [1, 1, 1, 1, 1]
    action:
      type: shell
      command: "afplay /System/Library/Sounds/Glass.aiff"

  double_peace:  # ✌️✌️
    type: static_dual
    pattern_left:  [0, 1, 1, 0, 0]
    pattern_right: [0, 1, 1, 0, 0]
    action:
      type: hotkey
      keys: ["cmd", "shift", "."]

  heart:  # 🫶 — both hands thumb+index out, palms close together
    type: static_dual
    pattern_left:  [1, 1, 0, 0, 0]
    pattern_right: [1, 1, 0, 0, 0]
    proximity: 0.18  # max palm-center distance (normalized 0..1)
    action:
      type: shell
      command: "echo -n '❤' | pbcopy"

  # Two-handed motion — each hand's swipe direction must match within
  # ~0.6s of the other for the gesture to fire.
  spread:  # both hands swipe outward
    type: motion_dual
    motion_left: swipe_left
    motion_right: swipe_right
    action:
      type: hotkey
      keys: ["cmd", "shift", "."]

  # Gesture macros — fire when an ORDERED sequence of leaf gestures
  # arrives within window_ms. Leaf gestures still fire normally on
  # their own; the macro adds an extra event when the sequence completes.
  combo_save:
    type: sequence
    sequence: ["thumbs_up", "peace"]
    window_ms: 1500
    action:
      type: hotkey
      keys: ["cmd", "s"]
