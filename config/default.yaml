camera:
  device: 0
  fps: 30
  resolution: [640, 480]

recognition:
  confidence_threshold: 0.85
  cooldown_ms: 800
  motion_buffer_frames: 20
  static_confirm_frames: 3

gestures:
  thumbs_up:
    type: static
    action:
      type: hotkey
      keys: ["cmd", "c"]

  peace:
    type: static
    action:
      type: hotkey
      keys: ["cmd", "v"]

  fist:
    type: static
    action:
      type: shell
      command: "osascript -e 'tell application \"Spotify\" to playpause'"

  open_palm:
    type: static
    action:
      type: hotkey
      keys: ["cmd", "tab"]

  ok_sign:
    type: static
    action:
      type: hotkey
      keys: ["cmd", "space"]

  swipe_left:
    type: motion
    action:
      type: shell
      command: "open -a 'Mission Control'"

  swipe_right:
    type: motion
    action:
      type: hotkey
      keys: ["cmd", "shift", "4"]

  # Custom static poses — pattern is [thumb, index, middle, ring, pinky],
  # 1=extended, 0=folded. Add your own with any 5-bit combo.
  rock:  # 🤘
    type: static
    pattern: [0, 1, 0, 0, 1]
    action:
      type: hotkey
      keys: ["cmd", "shift", "m"]  # Zoom mute mic

  phone:  # 🤙
    type: static
    pattern: [1, 0, 0, 0, 1]
    action:
      type: hotkey
      keys: ["cmd", "shift", "v"]  # Zoom toggle camera

  # Two-handed poses — both `pattern_left` and `pattern_right` must match.
  # type=static_dual is checked BEFORE single-hand poses when 2 hands visible.
  high_five:  # 🖐️🖐️
    type: static_dual
    pattern_left:  [1, 1, 1, 1, 1]
    pattern_right: [1, 1, 1, 1, 1]
    action:
      type: shell
      command: "afplay /System/Library/Sounds/Glass.aiff"

  double_peace:  # ✌️✌️
    type: static_dual
    pattern_left:  [0, 1, 1, 0, 0]
    pattern_right: [0, 1, 1, 0, 0]
    action:
      type: hotkey
      keys: ["cmd", "shift", "."]

  heart:  # 🫶 — both hands thumb+index out, palms close together
    type: static_dual
    pattern_left:  [1, 1, 0, 0, 0]
    pattern_right: [1, 1, 0, 0, 0]
    proximity: 0.18  # max palm-center distance (normalized 0..1)
    action:
      type: shell
      command: "echo -n '❤' | pbcopy"
