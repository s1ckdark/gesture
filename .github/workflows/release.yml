name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # needed to create the GitHub release

jobs:
  build-and-release:
    name: Build universal .dmg + GitHub release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          # Tag like 'v0.2.0' → version '0.2.0'
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME"

      - name: Sync VERSION file (in case workflow runs on a tag with a different VERSION)
        run: |
          echo "${{ steps.version.outputs.version }}" > VERSION

      - name: Resolve Swift packages
        working-directory: GestureApp
        run: swift package resolve

      - name: Build universal .app
        run: ./scripts/make-app.sh universal

      - name: Build DMG
        run: ./scripts/make-dmg.sh "${{ steps.version.outputs.version }}"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="$(mktemp)"
          awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { found = 1; print; next }
              found && /^## \[/ { exit }
              found { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "No CHANGELOG entry for $VERSION; falling back to a generic message."
            echo "Release v$VERSION" > "$NOTES_FILE"
          fi
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG="dist/Gesture-$VERSION.dmg"
          NOTES_FILE="${{ steps.notes.outputs.notes_file }}"

          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION exists; uploading DMG (clobber existing)."
            gh release upload "v$VERSION" "$DMG" --clobber
          else
            gh release create "v$VERSION" "$DMG" \
              --title "v$VERSION" \
              --notes-file "$NOTES_FILE"
          fi
