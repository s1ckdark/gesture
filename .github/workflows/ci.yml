name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  python-tests:
    name: Python tests (pytest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        # Classifier + socket tests don't need MediaPipe / OpenCV — keep CI fast.
        run: pip install --upgrade pip && pip install pytest pyyaml

      - name: Run pytest
        run: python -m pytest engine/tests/ -v

  swift-tests:
    name: Swift tests (swift test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Resolve packages
        working-directory: GestureApp
        run: swift package resolve

      - name: Run swift test
        working-directory: GestureApp
        run: swift test
